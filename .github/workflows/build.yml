name: Build Purple OS
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools

      - name: Run Build
        run: |
          chmod +x scripts/build_purple.sh
          sudo ./scripts/build_purple.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: PurpleOS-Image
          path: output/PurpleOS.iso
          if-no-files-found: error
