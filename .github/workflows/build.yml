name: Build Purple OS
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Live Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap squashfs-tools

      - name: Run Build
        run: |
          chmod +x scripts/build_purple.sh
          sudo ./scripts/build_purple.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: PurpleOS-Image
          # Live-build generates a file ending in .hybrid.iso
          path: "*.iso"
          if-no-files-found: error
