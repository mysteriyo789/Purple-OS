name: Build Purple OS
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Give it an hour just in case
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Build
        run: |
          chmod +x scripts/build_purple.sh
          sudo ./scripts/build_purple.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: PurpleOS-Image
          # This is the fix: look inside the output folder
          path: output/PurpleOS.iso
          if-no-files-found: error
